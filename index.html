<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 
  <title>Klass 7A – Schema</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- JS -->
  <script src="app.js" defer></script>
</head>

<body>

<header>
  <div class="header-left">
    <h1 id="dayTitle">
      <i class="fa-solid fa-calendar-day"></i>
      <span>Idag</span>
    </h1>

    <div id="liveInfo" class="live-info">
      <i class="fa-solid fa-clock"></i>
      Laddar schema...
    </div>
  </div>

  <!-- 🔐 ADMIN KNAPP UPPE -->
  <button id="adminBtn">
    <i class="fa-solid fa-lock"></i>
  </button>

  <div class="corner">
    <i class="fa-solid fa-code"></i>
    <span>Arkeljo</span>
    <i class="fa-solid fa-code"></i>
    <span>Senaste uppdaterat 24 03 2026 klockan 20:30</span>
  </div>
</header>

<main id="week"></main>

<!-- 🔐 LOGIN -->
<div id="adminLogin" class="hidden">
  <div class="popup">
    <h2>Admin</h2>
    <input type="password" id="adminCode" placeholder="Kod...">
    <button onclick="loginAdmin()">Logga in</button>
  </div>
</div>

<!-- ⚙️ EDIT -->
<div id="editPopup" class="hidden">
  <div class="popup">
    <h2>Redigera</h2>
    
    <input id="editSubject" placeholder="Ämne">
    <input id="editStart" type="time">
    <input id="editEnd" type="time">
    
    <label>
      <input type="checkbox" id="editCancel"> Inställd
    </label>

    <button onclick="saveEdit()">Spara</button>
  </div>
</div>

</body>
</html>
