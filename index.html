<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klass 7A – Schema</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Inter","Segoe UI",Arial,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:#1f2937;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:20px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

#dayTitle{font-size:28px;}
#liveInfo{font-size:16px;margin-top:6px;}

/* WEEK DESKTOP */
#week{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
  padding:30px;
  max-width:1400px;
  margin:0 auto;
}

/* DAY CARD */
.day{
  background:rgba(255,255,255,0.85);
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.2s;
}

.day:hover{
  transform:translateY(-4px);
}

.day h2{
  text-align:center;
  margin-bottom:12px;
  font-size:18px;
}

/* LESSON */
.lesson{
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  text-align:center;
  font-size:14px;
  transition:0.2s;
}

.lesson .time{font-size:11px;opacity:0.7;}
.lesson .subject{font-size:16px;font-weight:600;margin:4px 0;}

.current{
  outline:3px solid black;
  transform:scale(1.04);
}

.next{
  outline:2px dashed black;
}

/* COLORS */
.MA{background:#3b82f6;color:white;}
.SV{background:#fde047;}
.SO{background:#f43f5e;color:white;}
.NO{background:#22c55e;}
.EN{background:#f97316;color:white;}
.IDH{background:#10b981;}
.SLÖJD{background:#a855f7;color:white;}
.MENTOR{background:#8b5cf6;color:white;}
.LUNCH{background:#4b5563;color:white;}
.BLOCK{background:#9ca3af;}
.MU1OCHBL1,.MU2OCHBL2{background:#fb923c;}

/* MOBILE */
@media (max-width:768px){
  #week{
    display:flex;
    overflow-x:auto;
    gap:14px;
    padding:14px;
    scroll-snap-type:x mandatory;
  }

  .day{
    min-width:85%;
    scroll-snap-align:start;
  }

  .day h2{
    position:sticky;
    top:0;
    background:white;
    padding:8px;
    border-radius:10px;
  }
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:13px;
  color:#6b7280;
}
</style>
</head>

<body>

<header>
<h1 id="dayTitle"><span>Idag</span></h1>
<div id="liveInfo">Laddar...</div>
</header>

<div id="week"></div>

<footer>Utvecklad av Arkeljo Developer</footer>

<script>
// SCHEMA
let schema={
"Måndag":[
{start:"09:00",end:"09:20",subject:"MENTOR"},
{start:"09:20",end:"10:20",subject:"MA"},
{start:"10:30",end:"11:30",subject:"SV"},
{start:"11:40",end:"12:30",subject:"SO"},
{start:"12:30",end:"12:50",subject:"LUNCH"},
{start:"13:10",end:"13:50",subject:"NO"},
{start:"14:00",end:"14:50",subject:"EN"}
],
"Tisdag":[
{start:"08:20",end:"09:10",subject:"BLOCK"},
{start:"09:15",end:"10:15",subject:"MU1OCHBL1"},
{start:"10:20",end:"11:20",subject:"MU2OCHBL2"},
{start:"11:25",end:"12:25",subject:"MA"},
{start:"12:25",end:"12:45",subject:"LUNCH"},
{start:"13:05",end:"13:45",subject:"SV"},
{start:"13:55",end:"14:35",subject:"SO"}
],
"Onsdag":[
{start:"08:20",end:"09:20",subject:"SV"},
{start:"09:40",end:"10:40",subject:"MA"},
{start:"10:50",end:"11:40",subject:"SO"},
{start:"11:40",end:"12:00",subject:"LUNCH"},
{start:"12:25",end:"13:45",subject:"SLÖJD"},
{start:"13:50",end:"14:50",subject:"EN"}
],
"Torsdag":[
{start:"08:20",end:"09:30",subject:"IDH"},
{start:"09:50",end:"10:50",subject:"NO"},
{start:"11:15",end:"12:15",subject:"BLOCK"},
{start:"12:15",end:"12:35",subject:"LUNCH"},
{start:"12:50",end:"13:40",subject:"NO"},
{start:"13:45",end:"14:30",subject:"SO"}
],
"Fredag":[
{start:"08:00",end:"09:10",subject:"IDH"},
{start:"09:20",end:"10:10",subject:"BLOCK"},
{start:"10:20",end:"11:20",subject:"NO"},
{start:"11:30",end:"11:50",subject:"LUNCH"},
{start:"12:10",end:"12:50",subject:"SO"},
{start:"13:00",end:"13:40",subject:"MA"}
]
};

// RENDER
const weekEl=document.getElementById("week");

Object.keys(schema).forEach(day=>{
  const d=document.createElement("div");
  d.className="day";
  d.dataset.day=day;
  d.innerHTML=`<h2>${day}</h2>`;

  schema[day].forEach(l=>{
    const div=document.createElement("div");
    div.className="lesson "+l.subject;
    div.dataset.start=l.start;
    div.dataset.day=day;

    div.innerHTML=`
      <div class="time">${l.start}</div>
      <div class="subject">${l.subject}</div>
      <div class="time">${l.end}</div>
    `;
    d.appendChild(div);
  });

  weekEl.appendChild(d);
});

// AUTO SCROLL
function scrollToToday(){
  const now=new Date();
  const days=["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
  const today=days[now.getDay()];
  const el=document.querySelector(`.day[data-day="${today}"]`);
  if(el) el.scrollIntoView({behavior:"smooth",inline:"center"});
}
scrollToToday();

// TIME
function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

// LIVE
function update(){
  const now=new Date();
  const min=now.getHours()*60+now.getMinutes();
  const days=["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
  const today=days[now.getDay()];

  document.querySelector("#dayTitle span").textContent=today;

  document.querySelectorAll(".lesson").forEach(l=>{
    l.classList.remove("current","next");
  });

  if(!schema[today]){
    liveInfo.textContent="Ingen skola";
    return;
  }

  let current=null;
  let next=null;

  for(let l of schema[today]){
    const s=toMin(l.start);
    const e=toMin(l.end);

    if(min>=s && min<e) current=l;
    if(min<s && !next) next=l;
  }

  if(current){
    document.querySelectorAll(`.lesson[data-day="${today}"]`).forEach(div=>{
      if(div.dataset.start===current.start){
        div.classList.add("current");
      }
    });
    liveInfo.innerHTML=`Nu: ${current.subject}`;
  }
  else if(next){
    document.querySelectorAll(`.lesson[data-day="${today}"]`).forEach(div=>{
      if(div.dataset.start===next.start){
        div.classList.add("next");
      }
    });
    liveInfo.innerHTML=`Nästa: ${next.subject}`;
  }
  else{
    liveInfo.innerHTML="Slut för idag";
  }
}

update();
setInterval(update,30000);
</script>

</body>
</html>
