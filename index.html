<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klass 7A – Schema</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

/* HEADER */
header{
  text-align:center;
  padding:16px;
  background:white;
  position:sticky;
  top:0;
}

#dayTitle{font-size:22px;}
#liveInfo{font-size:14px;margin-top:6px;}

/* WEEK */
#week{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  padding:20px;
  max-width:1300px;
  margin:auto;
}

/* DAY */
.day{
  background:white;
  border-radius:16px;
  padding:12px;
}

/* LESSON */
.lesson{
  padding:10px;
  margin-bottom:8px;
  border-radius:12px;
  text-align:center;
  background:#e5e7eb;
}

/* CURRENT (ANIMERAD GRÖN) */
.current{
  background:#22c55e !important;
  color:white;
  animation:pulse 1.5s infinite;
}

/* ANIMERAD AKTIV LEKTION */
.current{
  outline:3px solid #16a34a;
  background:#22c55e !important;
  color:white;
  transform:scale(1.05);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.6);}
  70%{box-shadow:0 0 0 12px rgba(34,197,94,0);}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
}

/* NEXT */
.next{
  border:2px dashed black;
}

/* ANIMATION */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* MOBILE */
@media(max-width:768px){
  #week{
    display:flex;
    overflow-x:auto;
  }
  .day{
    min-width:85%;
  }
}
</style>
</head>

<body>

<header>
<h1 id="dayTitle">Idag</h1>
<div id="liveInfo">Laddar...</div>
</header>

<div id="week"></div>

<script>
// SCHEMA
let schema={
"Måndag":[
{start:"09:00",end:"09:20",subject:"MENTOR"},
{start:"09:20",end:"10:20",subject:"MA"},
{start:"10:30",end:"11:30",subject:"SV"},
{start:"11:40",end:"12:30",subject:"SO"}
]
};

// RENDER
const weekEl=document.getElementById("week");

Object.keys(schema).forEach(day=>{
  const d=document.createElement("div");
  d.className="day";
  d.dataset.day=day;
  d.innerHTML=`<h2>${day}</h2>`;

  schema[day].forEach(l=>{
    const div=document.createElement("div");
    div.className="lesson";
    div.dataset.start=l.start;
    div.dataset.end=l.end;
    div.dataset.day=day;

    div.innerHTML=`${l.start} - ${l.end}<br>${l.subject}`;
    d.appendChild(div);
  });

  weekEl.appendChild(d);
});

// TIME
function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

// LIVE SYSTEME
function update(){
  const now=new Date();
  const min=now.getHours()*60+now.getMinutes();
  const days=["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
  const today=days[now.getDay()];

  document.querySelector("#dayTitle span").textContent=today;

  document.querySelectorAll(".lesson").forEach(l=>{
    l.classList.remove("current","next");
  });

  if(!schema[today]){
    liveInfo.textContent="Ingen skola";
    return;
  }

  let current=null;
  let next=null;
  let previous=null;

  for(let l of schema[today]){
    const s=toMin(l.start);
    const e=toMin(l.end);

    if(min>=s && min<e) current=l;
    if(min<s && !next) next=l;
    if(min>=e) previous=l;
  }

  if(current){
    const start=toMin(current.start);
    const end=toMin(current.end);

    const duration=end-start;
    const left=end-min;

    document.querySelectorAll(`.lesson[data-day="${today}"]`).forEach(div=>{
      if(div.dataset.start===current.start){
        div.classList.add("current");
      }
    });

    liveInfo.innerHTML=`
    Nu: ${current.subject}<br>
    ⏳ ${left} min kvar<br>
    ⏱️ Längd: ${duration} min
    `;
  }
  else if(next){
    const until=toMin(next.start)-min;

    let breakTime = 0;
    if(previous){
      breakTime = toMin(next.start) - toMin(previous.end);
    }

    document.querySelectorAll(`.lesson[data-day="${today}"]`).forEach(div=>{
      if(div.dataset.start===next.start){
        div.classList.add("next");
      }
    });

    liveInfo.innerHTML=`
    Rast: ${until} min<br>
    ⏸️ Rast totalt: ${breakTime} min<br>
    Nästa: ${next.subject}<br>
    Börjar om ${until} min
    `;
  }
  else{
    liveInfo.innerHTML="Slut för idag";
  }
}
update();
setInterval(update,1000);
</script>

</body>
</html>
