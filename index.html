<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 
  <title>Klass 7A – Schema</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    /* Hela sidan röd med svart text och centrerat innehåll */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: red;
      color: black;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center; /* horisontellt */
      align-items: center;     /* vertikalt */
      flex-direction: column;
      text-align: center;
    }

    #dayTitle {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    #liveInfo {
      font-size: 1.5rem;
      margin-bottom: 40px;
    }

    .corner {
      font-size: 2rem;
    }

    .update-text {
      display: block;
      margin-top: 10px;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>

  <script src="app.js" defer></script>
</head>

<body>

<header>
  <h1 id="dayTitle">
    <i class="fa-solid fa-calendar-day"></i>
    <span>Idag</span>
  </h1>

  <div id="liveInfo">
    <i class="fa-solid fa-clock"></i>
    Laddar schema...
  </div>

  <div class="corner">
    <span>MVH Arkeljo</span>
    <span class="update-text">Under uppdaterning </span>
  </div>
</header>

</body>
</html>
