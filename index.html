<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 
  <title>Klass 7A – Schema</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Snabb CSS för centrering och röd text */
    .corner {
      text-align: center;
      margin-top: 10px;
    }

    .update-text {
      color: red;
      display: block;
      margin-top: 5px;
      font-weight: bold;
    }
  </style>

  <!-- JS -->
  <script src="app.js" defer></script>
</head>

<body>

<header>
  <div class="header-left">
    <h1 id="dayTitle">
      <i class="fa-solid fa-calendar-day"></i>
      <span>Idag</span>
    </h1>

    <div id="liveInfo" class="live-info">
      <i class="fa-solid fa-clock"></i>
      Laddar schema...
    </div>
  </div>

  <div class="corner">
    <i class="fa-solid fa-code"></i>
    <span>Arkeljo</span>
    <span class="update-text">Senaste uppdaterat 24 03 2026 klockan 20:30</span>
  </div>
</header>

<main>
  <!-- Här kan ditt schema ligga -->
</main>

<!-- ⚙️ EDIT -->
<div id="editPopup" class="hidden">
  <div class="popup">
    <h2>Redigera</h2>
    
    <input id="editSubject" placeholder="Ämne">
    <input id="editStart" type="time">
    <input id="editEnd" type="time">
    
    <label>
      <input type="checkbox" id="editCancel"> Inställd
    </label>

    <button onclick="saveEdit()">Spara</button>
  </div>
</div>

</body>
</html>
